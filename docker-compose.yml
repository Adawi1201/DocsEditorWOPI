version: '3.8'

services:
  collabora:
    # 使用本地下载的版本
    image: collabora/code:24.04.6.2.1
    container_name: collabora
    ports:
      - "9980:9980"
    environment:
      # 使用 host.docker.internal 访问宿主机上的 Django
      - domain=host.docker.internal
      - username=admin
      - password=admin123
      # 禁用 SSL 并允许 WOPI 通信
      - extra_params=--o:ssl.enable=false --o:net.post_allow=yes --o:net.proto=all
    # 添加必要的 Linux 能力
    cap_add:
      - MKNOD
      - CHOWN
    restart: unless-stopped
    networks:
      - collabora-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  collabora-network:
    driver: bridge
